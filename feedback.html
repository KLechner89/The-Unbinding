<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Unbinding — Feedback</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400&display=swap');

:root{
  --bg:#0a0a0c;
  --surface:#111114;
  --border:#252529;
  --text:#e8e4df;
  --text-dim:#c4bfb8;
  --text-muted:#8a8680;
  --text-ghost:#4a4744;
  --red:#c4453a;
  --amber:#c49a3a;
  --teal:#3ac4a8;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'EB Garamond','Cormorant Garamond',Georgia,serif;
  line-height:1.7;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:48px 24px;
}

.container{
  max-width:560px;
  width:100%;
  opacity:0;
  transform:translateY(24px);
  animation:fadeUp 1.6s ease 0.3s forwards;
}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0)}
}

.back{
  font-family:'JetBrains Mono',monospace;
  font-size:0.55rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--text-ghost);
  text-decoration:none;
  display:inline-block;
  margin-bottom:48px;
  transition:color 0.3s;
}
.back:hover{color:var(--text-muted)}

h1{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-weight:300;
  font-size:2.4rem;
  letter-spacing:0.02em;
  color:var(--text);
  margin-bottom:12px;
}

h1 span{
  font-style:italic;
  font-weight:300;
  color:var(--red);
}

.sub{
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem;
  letter-spacing:0.12em;
  color:var(--text-muted);
  margin-bottom:48px;
  line-height:1.8;
}

.field{
  margin-bottom:28px;
}

label{
  display:block;
  font-family:'JetBrains Mono',monospace;
  font-size:0.55rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--text-muted);
  margin-bottom:10px;
}

input[type="text"],
input[type="email"],
textarea{
  width:100%;
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
  font-family:'EB Garamond','Cormorant Garamond',Georgia,serif;
  font-size:1.05rem;
  line-height:1.7;
  padding:14px 16px;
  border-radius:2px;
  outline:none;
  transition:border-color 0.3s;
  -webkit-appearance:none;
}

input[type="text"]:focus,
input[type="email"]:focus,
textarea:focus{
  border-color:var(--text-muted);
}

input[type="text"]::placeholder,
input[type="email"]::placeholder,
textarea::placeholder{
  color:var(--text-ghost);
  font-style:italic;
}

textarea{
  min-height:200px;
  resize:vertical;
}

.optional{
  font-style:italic;
  text-transform:none;
  letter-spacing:0.05em;
  color:var(--text-ghost);
}

button[type="submit"]{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text-dim);
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  padding:14px 36px;
  border-radius:2px;
  cursor:pointer;
  transition:border-color 0.3s, color 0.3s;
  -webkit-tap-highlight-color:transparent;
}

button[type="submit"]:hover{
  border-color:var(--text-muted);
  color:var(--text);
}

.note{
  margin-top:32px;
  font-family:'JetBrains Mono',monospace;
  font-size:0.5rem;
  letter-spacing:0.1em;
  color:var(--text-ghost);
  line-height:2;
}

/* Success state */
.success{
  text-align:center;
  padding:80px 0;
}

.success h2{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-weight:300;
  font-size:1.8rem;
  color:var(--text);
  margin-bottom:16px;
}

.success p{
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem;
  letter-spacing:0.1em;
  color:var(--text-muted);
}

.hidden{display:none}
</style>
</head>
<body>

<div class="container" id="formView">
  <a href="/" class="back">← The Unbinding</a>

  <h1>What did you <span>feel?</span></h1>
  <p class="sub">This is private. Your response goes only to the author. Nothing is displayed publicly.</p>

  <form name="feedback" method="POST" data-netlify="true" netlify-honeypot="bot-field" onsubmit="submitForm(event)">
    <p class="hidden"><label>Don't fill this out: <input name="bot-field"></label></p>

    <div class="field">
      <label>Name <span class="optional">(optional)</span></label>
      <input type="text" name="name" placeholder="Or leave blank">
    </div>

    <div class="field">
      <label>Email <span class="optional">(optional, if you'd like a response)</span></label>
      <input type="email" name="email" placeholder="Or leave blank">
    </div>

    <div class="field">
      <label>Your response</label>
      <textarea name="message" placeholder="Whatever you want to say." required></textarea>
    </div>

    <button type="submit">Send</button>
  </form>

  <p class="note">Responses are collected via Netlify Forms and delivered to Kyle Lechner. They are not shared, published, or displayed.</p>
</div>

<div class="container hidden" id="successView">
  <a href="/" class="back">← The Unbinding</a>
  <div class="success">
    <h2 style="color:#c4453a">Received.</h2>
    <p>Thank you for reading.</p>
  </div>
</div>

<script>
async function submitForm(e) {
  e.preventDefault();
  const form = e.target;
  const data = new URLSearchParams(new FormData(form));
  try {
    await fetch('/', { method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body: data.toString() });
    document.getElementById('formView').classList.add('hidden');
    document.getElementById('successView').classList.remove('hidden');
  } catch(err) {
    alert('Something went wrong. Please try again.');
  }
}
</script>

</body>
</html>
